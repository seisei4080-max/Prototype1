<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレ管理Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(rgba(20,15,10,0.85), rgba(20,15,10,0.95)),
    url("https://images.unsplash.com/photo-1524758631624-e2822e304c36");
  background-size: cover;
  background-attachment: fixed;
  color: #f5f5f5;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 30px;
  letter-spacing: 1px;
}

.subtitle {
  text-align: center;
  color: #cbd5f5;
  margin-bottom: 20px;
}

.card {
  background: rgba(40,30,20,0.75);
  backdrop-filter: blur(8px);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
}

h3 {
  margin-top: 0;
}

input, select {
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
  width: 100%;
  background: #1c1c1c;
  color: #f5f5f5;
}

input::placeholder {
  color: #aaa;
}

button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #8b5e3c, #c08a5b);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  background: linear-gradient(90deg, #a9744f, #d4a373);
}

.delete-btn {
  background: #7f1d1d;
  margin-top: 8px;
}

.record {
  background: rgba(20,15,10,0.7);
  margin: 8px 0;
  padding: 10px;
  border-radius: 12px;
  border-left: 4px solid #c08a5b;
}
</style>
</head>

<body>

<div class="container">

<h1>💪 筋トレ管理Pro</h1>
<p class="subtitle">記録・分析・成長を木の温もりで</p>

<div class="card">
<h3>記録する</h3>

<input type="date" id="date">

<select id="exerciseSelect">
  <option value="">種目を選択</option>
  <option>ベンチプレス</option>
  <option>スクワット</option>
  <option>デッドリフト</option>
</select>

<input id="exercise" placeholder="または自由入力">
<input id="weight" type="number" placeholder="重量 (kg)">
<input id="reps" type="number" placeholder="回数">

<button onclick="addRecord()">記録する🔥</button>
</div>

<div class="card">
<h3>記録一覧</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>📊 成長グラフ</h3>

<select id="graphExercise" onchange="drawChart()">
  <option>ベンチプレス</option>
  <option>スクワット</option>
  <option>デッドリフト</option>
</select>

<canvas id="chart"></canvas>
</div>

</div>

<script>
let records = JSON.parse(localStorage.getItem("records")) || [];

function save() {
  localStorage.setItem("records", JSON.stringify(records));
}

function addRecord() {
  let ex = document.getElementById("exercise").value;
  const select = document.getElementById("exerciseSelect").value;

  if (!ex) ex = select;

  const date = document.getElementById("date").value;
  const w = document.getElementById("weight").value;
  const r = document.getElementById("reps").value;

  if (!date || !ex || !w || !r) {
    alert("全部入力して");
    return;
  }

  records.push({ date, ex, w: Number(w), r });
  save();
  render();
  drawChart();
}

function deleteRecord(index) {
  records.splice(index, 1);
  save();
  render();
  drawChart();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.forEach((rec, i) => {
    const div = document.createElement("div");
    div.className = "record";

    div.innerHTML = `
      ${rec.date}｜${rec.ex} - ${rec.w}kg × ${rec.r}回
      <button class="delete-btn" onclick="deleteRecord(${i})">削除</button>
    `;

    list.appendChild(div);
  });
}

let chart;

function drawChart() {
  const type = document.getElementById("graphExercise").value;

  const filtered = records
    .filter(r => r.ex === type)
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  const labels = filtered.map(r => r.date);
  const data = filtered.map(r => r.w);

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: type + " 重量",
        data: data,
        borderColor: "#c08a5b",
        tension: 0.3
      }]
    }
  });
}

render();
drawChart();
</script>

</body>
</html>
