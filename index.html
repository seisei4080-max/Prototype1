<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレ管理Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(rgba(20,15,10,0.85), rgba(20,15,10,0.95)),
    url("https://images.unsplash.com/photo-1524758631624-e2822e304c36");
  background-size: cover;
  background-attachment: fixed;
  color: #f5f5f5;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(40,30,20,0.75);
  backdrop-filter: blur(8px);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
  width: 100%;
  background: #1c1c1c;
  color: white;
}

button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #8b5e3c, #c08a5b);
  color: white;
  font-weight: bold;
}

.delete-btn {
  background: #7f1d1d;
}

.record {
  background: rgba(20,15,10,0.7);
  margin: 8px 0;
  padding: 10px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>💪 筋トレ管理Pro</h1>
<p>成長を記録し、可視化するトレーニングアプリ</p>

<div class="card">
<h3>記録</h3>

<input type="date" id="date">

<select id="exerciseSelect">
  <option value="">選択</option>
  <option>ベンチプレス</option>
  <option>スクワット</option>
  <option>デッドリフト</option>
  <option>懸垂</option>
  <option>ショルダープレス</option>
  <option>アームカール</option>
</select>

<input id="exercise" placeholder="自由入力">
<input id="weight" type="number" placeholder="kg">
<input id="reps" type="number" placeholder="回数">

<button onclick="addRecord()">記録する🔥</button>
</div>

<div class="card">
<h3>📊 分析</h3>
<p>最高記録(PR): <span id="pr">-</span></p>
</div>

<div class="card">
<h3>記録一覧</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>📈 成長グラフ</h3>

<select id="graphExercise" onchange="drawChart()">
  <option>ベンチプレス</option>
  <option>スクワット</option>
  <option>デッドリフト</option>
</select>

<canvas id="chart"></canvas>
</div>

</div>

<script>
let records = JSON.parse(localStorage.getItem("records")) || [];

document.getElementById("date").value = new Date().toISOString().split("T")[0];

function save() {
  localStorage.setItem("records", JSON.stringify(records));
}

function addRecord() {
  let ex = document.getElementById("exercise").value;
  const select = document.getElementById("exerciseSelect").value;
  if (!ex) ex = select;

  const date = document.getElementById("date").value;
  const w = document.getElementById("weight").value;
  const r = document.getElementById("reps").value;

  if (!date || !ex || !w || !r) return alert("全部入力");

  records.push({ date, ex, w: Number(w), r });
  save();
  render();
  drawChart();
}

function deleteRecord(i) {
  if (!confirm("削除する？")) return;
  records.splice(i,1);
  save();
  render();
  drawChart();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.forEach((rec,i)=>{
    list.innerHTML += `
      <div class="record">
        ${rec.date}｜${rec.ex} ${rec.w}kg×${rec.r}
        <button class="delete-btn" onclick="deleteRecord(${i})">削除</button>
      </div>
    `;
  });
}

function getPR(type) {
  const f = records.filter(r=>r.ex===type);
  if(!f.length) return "-";
  return Math.max(...f.map(r=>r.w))+"kg";
}

let chart;

function drawChart() {
  const type = document.getElementById("graphExercise").value;

  const f = records
    .filter(r=>r.ex===type)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  document.getElementById("pr").textContent = getPR(type);

  const labels = f.map(r=>r.date);
  const data = f.map(r=>r.w);

  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:type,
        data,
        borderColor:"#c08a5b",
        backgroundColor:"rgba(192,138,91,0.2)",
        fill:true,
        tension:0.4
      }]
    }
  });
}

render();
drawChart();
</script>

</body>
</html>
