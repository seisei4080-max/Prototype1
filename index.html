<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレ管理Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(rgba(20,15,10,0.85), rgba(20,15,10,0.95)),
    url("https://images.unsplash.com/photo-1524758631624-e2822e304c36");
  background-size: cover;
  color: #f5f5f5;
}

.container { max-width: 900px; margin:auto; padding:20px; }

.card {
  background: rgba(40,30,20,0.75);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
}

input, select {
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  width:100%;
  background:#1c1c1c;
  color:white;
  border:none;
}

button {
  padding:12px;
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:12px;
  background: linear-gradient(90deg,#8b5e3c,#c08a5b);
  color:white;
}

.delete-btn { background:#7f1d1d; }

.record {
  background: rgba(20,15,10,0.7);
  padding:10px;
  margin:8px 0;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>💪 筋トレ管理Pro</h1>

<div class="card">
<h3>記録</h3>

<input type="date" id="date">

<select id="exerciseSelect">
<option>ベンチプレス</option>
<option>スクワット</option>
<option>デッドリフト</option>
</select>

<input id="weight" type="number" placeholder="kg">
<input id="reps" type="number" placeholder="回数">

<button onclick="addRecord()">記録</button>
</div>

<div class="card">
<h3>🏆 BIG3 合計</h3>
<p id="big3">0kg</p>
</div>

<div class="card">
<h3>記録一覧</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>📊 グラフ</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let records = JSON.parse(localStorage.getItem("records")) || [];

document.getElementById("date").value = new Date().toISOString().split("T")[0];

function save(){
  localStorage.setItem("records",JSON.stringify(records));
}

function addRecord(){
  const date = document.getElementById("date").value;
  const ex = document.getElementById("exerciseSelect").value;
  const w = document.getElementById("weight").value;
  const r = document.getElementById("reps").value;

  if(!date||!w||!r) return alert("入力");

  records.push({date,ex,w:Number(w),r});
  save();
  render();
  drawChart();
}

function deleteRecord(i){
  if(!confirm("削除する？")) return;
  records.splice(i,1);
  save();
  render();
  drawChart();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML="";

  records.forEach((rec,i)=>{
    list.innerHTML+=`
    <div class="record">
    ${rec.date}｜${rec.ex} ${rec.w}kg
    <button class="delete-btn" onclick="deleteRecord(${i})">削除</button>
    </div>`;
  });
}

function getLatestWeight(type){
  const f = records.filter(r=>r.ex===type);
  if(!f.length) return 0;
  return f[f.length-1].w;
}

function updateBig3(){
  const bench = getLatestWeight("ベンチプレス");
  const squat = getLatestWeight("スクワット");
  const dead = getLatestWeight("デッドリフト");

  const total = bench + squat + dead;
  document.getElementById("big3").textContent = total + "kg";
}

let chart;

function drawChart(){
  updateBig3();

  const dates = [...new Set(records.map(r=>r.date))].sort();

  const benchData = [];
  const squatData = [];
  const deadData = [];
  const totalData = [];

  dates.forEach(d=>{
    const day = records.filter(r=>r.date===d);

    const bench = day.find(r=>r.ex==="ベンチプレス")?.w || 0;
    const squat = day.find(r=>r.ex==="スクワット")?.w || 0;
    const dead = day.find(r=>r.ex==="デッドリフト")?.w || 0;

    benchData.push(bench);
    squatData.push(squat);
    deadData.push(dead);
    totalData.push(bench+squat+dead);
  });

  const ctx = document.getElementById("chart");
  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:dates,
      datasets:[
        {label:"BIG3合計", data:totalData, borderWidth:3},
        {label:"ベンチ", data:benchData},
        {label:"スクワット", data:squatData},
        {label:"デッド", data:deadData}
      ]
    }
  });
}

render();
drawChart();
</script>
</body>
</html>
